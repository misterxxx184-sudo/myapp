<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0a1a"/>
      <stop offset="100%" stop-color="#0c0608"/>
    </linearGradient>

    <!-- Pink glow radial at top-left -->
    <radialGradient id="glowTL" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#e91e63" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e91e63" stop-opacity="0"/>
    </radialGradient>

    <!-- Violet glow radial at bottom-right -->
    <radialGradient id="glowBR" cx="80%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#ab47bc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0"/>
    </radialGradient>

    <!-- Arrow / flame body gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="45%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>

    <!-- Gold arrowhead gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffab40"/>
    </linearGradient>

    <!-- Ring stroke gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4081" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ab47bc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e91e63" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glass gloss overlay gradient -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Pink glow filter for arrow -->
    <filter id="pinkGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient glow for whole emblem -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gold sparkle glow -->
    <filter id="goldGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Ambient atmosphere glows -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glowTL)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glowBR)"/>

  <!-- ── SUBTLE NOISE TEXTURE via small repeated diamonds ── -->
  <g clip-path="url(#roundedClip)" opacity="0.025">
    <rect width="512" height="512" fill="none" stroke="#ffb0d0" stroke-width="0.5"
          style="stroke-dasharray:1 7"/>
  </g>

  <!-- ── OUTER RING — orbital circle representing system/mastery ── -->
  <circle cx="256" cy="256" r="168"
          fill="none"
          stroke="url(#ringGrad)"
          stroke-width="1.5"
          stroke-dasharray="10 5 2 5"
          opacity="0.7"/>

  <!-- ── INNER RING ── -->
  <circle cx="256" cy="256" r="130"
          fill="none"
          stroke="rgba(255,160,210,0.12)"
          stroke-width="1"/>

  <!-- ── MAIN EMBLEM GROUP ── -->
  <g filter="url(#softGlow)">

    <!-- ══════════════════════════════════════════════════════════
         DETAILED ARROW — drawn horizontal, rotated -45° at center
         Centerline y=256. Nock at x=88, point tip at x=434.
         ══════════════════════════════════════════════════════════ -->
    <g transform="rotate(-45,256,256)">

      <!-- ── Glow halo ── -->
      <line x1="110" y1="256" x2="400" y2="256"
            stroke="#e91e63" stroke-width="32" stroke-linecap="round" opacity="0.08"/>

      <!-- ══ SHAFT (x=155 to x=395) ══ -->
      <!-- Core shaft cylinder -->
      <rect x="155" y="250" width="240" height="12" rx="4"
            fill="url(#arrowGrad)" opacity="0.96"/>
      <!-- Top highlight — light edge -->
      <rect x="158" y="250" width="234" height="4" rx="2"
            fill="#ff80ab" opacity="0.3"/>
      <!-- Bottom shadow — depth -->
      <rect x="158" y="259" width="234" height="3" rx="1"
            fill="#5a0028" opacity="0.5"/>
      <!-- Wood grain -->
      <line x1="175" y1="251" x2="195" y2="261" stroke="#a01040" stroke-width="0.8" opacity="0.3"/>
      <line x1="225" y1="251" x2="245" y2="261" stroke="#a01040" stroke-width="0.8" opacity="0.3"/>
      <line x1="275" y1="251" x2="295" y2="261" stroke="#a01040" stroke-width="0.8" opacity="0.3"/>
      <line x1="325" y1="251" x2="345" y2="261" stroke="#a01040" stroke-width="0.8" opacity="0.3"/>

      <!-- ══ THREAD BINDING (x=155–178, holds fletching to shaft) ══ -->
      <g stroke="#ffab40" stroke-width="2.2" stroke-linecap="round" opacity="0.85">
        <line x1="157" y1="250" x2="160" y2="262"/>
        <line x1="162" y1="250" x2="165" y2="262"/>
        <line x1="167" y1="250" x2="170" y2="262"/>
        <line x1="172" y1="250" x2="175" y2="262"/>
      </g>
      <rect x="155" y="250" width="22" height="5" rx="1" fill="#ffe082" opacity="0.12"/>

      <!-- ══ LARGE ORGANIC FEATHER FLETCHING ══
           Feathers sweep BACKWARD (away from tip/heart), narrow profile
      ══ -->

      <!-- COCK VANE — top feather, sweeps back away from tip, hot pink -->
      <path d="
        M 155,250
        C 145,244  128,234  108,226
        C  98,222   92,228   92,238
        L  98,250
        Z"
        fill="#ff4081" opacity="0.90"/>
      <!-- Inner sheen -->
      <path d="
        M 152,250
        C 142,245  126,236  108,229
        C 100,225   95,230   95,238
        C  96,232  100,226  108,226
        C 128,234  145,244  155,250
        Z"
        fill="#ff80ab" opacity="0.28"/>
      <!-- Quill spine -->
      <line x1="155" y1="250" x2="108" y2="226" stroke="#ffb3c6" stroke-width="1" opacity="0.5"/>
      <line x1="108" y1="226" x2="94" y2="244" stroke="#ffb3c6" stroke-width="0.8" opacity="0.35"/>
      <!-- Barbs -->
      <g stroke="#ff80ab" stroke-width="0.9" opacity="0.45">
        <line x1="150" y1="250" x2="148" y2="240"/>
        <line x1="144" y1="249" x2="140" y2="236"/>
        <line x1="137" y1="247" x2="132" y2="232"/>
        <line x1="130" y1="245" x2="124" y2="229"/>
        <line x1="122" y1="243" x2="116" y2="228"/>
        <line x1="114" y1="241" x2="109" y2="228"/>
        <line x1="106" y1="239" x2="103" y2="232"/>
        <line x1="100" y1="244" x2="97" y2="238"/>
      </g>

      <!-- HEN VANE — bottom feather, sweeps back, violet -->
      <path d="
        M 155,262
        C 145,268  128,278  108,286
        C  98,290   92,284   92,274
        L  98,262
        Z"
        fill="#ab47bc" opacity="0.88"/>
      <!-- Inner sheen -->
      <path d="
        M 152,262
        C 142,267  126,276  108,283
        C 100,287   95,282   95,274
        C  96,280  100,286  108,286
        C 128,278  145,268  155,262
        Z"
        fill="#ce93d8" opacity="0.22"/>
      <!-- Quill spine -->
      <line x1="155" y1="262" x2="108" y2="286" stroke="#ce93d8" stroke-width="1" opacity="0.5"/>
      <line x1="108" y1="286" x2="94" y2="268" stroke="#ce93d8" stroke-width="0.8" opacity="0.35"/>
      <!-- Barbs -->
      <g stroke="#ce93d8" stroke-width="0.9" opacity="0.40">
        <line x1="150" y1="262" x2="148" y2="272"/>
        <line x1="144" y1="263" x2="140" y2="276"/>
        <line x1="137" y1="265" x2="132" y2="280"/>
        <line x1="130" y1="267" x2="124" y2="283"/>
        <line x1="122" y1="269" x2="116" y2="284"/>
        <line x1="114" y1="271" x2="109" y2="284"/>
        <line x1="106" y1="272" x2="103" y2="280"/>
        <line x1="100" y1="268" x2="97" y2="274"/>
      </g>

      <!-- ══ NOCK (x=88–100) — simple clean arrow nock ══ -->
      <!-- Nock body — dark tapered plug -->
      <path d="M 100,250 L 96,251 L 90,254 L 88,256 L 90,258 L 96,261 L 100,262 Z"
            fill="#2a000f" stroke="#e91e63" stroke-width="1" opacity="0.95"/>
      <!-- Nock groove (string slot at very tip) -->
      <path d="M 88,256 L 94,252 L 94,260 Z" fill="#0a0006" opacity="0.95"/>
      <!-- Nock accent ring -->
      <line x1="96" y1="251" x2="96" y2="261" stroke="#ffab40" stroke-width="1.5" opacity="0.7"/>
      <!-- Nock highlight -->
      <line x1="90" y1="253" x2="100" y2="251" stroke="#ff80ab" stroke-width="1" opacity="0.4"/>

      <!-- ══ FOOTING (x=378–396) — dark hardwood insert near head ══ -->
      <rect x="378" y="248" width="18" height="16" rx="2"
            fill="#3a0018" opacity="0.97"/>
      <rect x="379" y="249" width="16" height="5" rx="1" fill="#c2185b" opacity="0.35"/>
      <line x1="383" y1="248" x2="383" y2="264" stroke="#ff4081" stroke-width="1" opacity="0.45"/>
      <line x1="388" y1="248" x2="388" y2="264" stroke="#ff4081" stroke-width="1" opacity="0.45"/>

      <!-- ══ FERRULE (x=396–408) — gold socket ══ -->
      <rect x="396" y="248" width="12" height="16" rx="2"
            fill="url(#goldGrad)" opacity="0.97"/>
      <rect x="397" y="249" width="10" height="5" rx="1" fill="#fff9e6" opacity="0.35"/>
      <line x1="402" y1="248" x2="402" y2="264" stroke="#b87a00" stroke-width="1" opacity="0.5"/>

      <!-- ══ ARROWHEAD — classic medieval broadhead triangle ══ -->
      <!-- Glint behind head -->
      <ellipse cx="420" cy="256" rx="26" ry="14" fill="#ffab40" opacity="0.10" filter="url(#goldGlow)"/>
      <!-- Main head: tip=(434,256) shoulders=(408,240) and (408,272) with barbs -->
      <!-- Shoulder barbs flare back: barb-top=(412,238) barb-notch-top=(408,246)
                                       barb-bot=(412,274) barb-notch-bot=(408,266) -->
      <path d="
        M 434,256
        L 414,238
        L 411,244
        L 408,243
        L 409,250
        L 408,256
        L 409,262
        L 408,269
        L 411,268
        L 414,274
        Z"
        fill="url(#goldGrad)" opacity="0.97"/>
      <!-- Upper face highlight -->
      <path d="M 434,256 L 414,238 L 420,256 Z" fill="#fff9e6" opacity="0.40"/>
      <!-- Medial ridge -->
      <line x1="408" y1="256" x2="432" y2="256" stroke="#ffe082" stroke-width="1.5" opacity="0.55"/>
      <!-- Blade edges -->
      <line x1="414" y1="238" x2="434" y2="256" stroke="#fffde7" stroke-width="1" opacity="0.45"/>
      <line x1="414" y1="274" x2="434" y2="256" stroke="#fff9e6" stroke-width="0.8" opacity="0.3"/>

    </g>
    <!-- end arrow -->

    <!-- ── HEART at center of arrow (desire motif) ── -->
    <!-- Centered at 256,256, size ~90px -->
    <path d="M256,308
             C256,308 196,272 196,234
             C196,212 212,196 232,196
             C243,196 256,208 256,208
             C256,208 269,196 280,196
             C300,196 316,212 316,234
             C316,272 256,308 256,308Z"
          fill="#e91e63"
          opacity="0.97"/>
    <!-- Heart inner highlight -->
    <path d="M244,218
             C244,218 232,228 232,240
             C232,244 236,248 240,246
             C244,244 248,232 252,224Z"
          fill="#ff80ab"
          opacity="0.5"/>
    <!-- Heart glow pulse ring -->
    <path d="M256,316
             C256,316 188,278 188,234
             C188,208 206,190 228,190
             C240,190 256,204 256,204
             C256,204 272,190 284,190
             C306,190 324,208 324,234
             C324,278 256,316 256,316Z"
          fill="none"
          stroke="#e91e63"
          stroke-width="2"
          opacity="0.35"/>

  </g>

  <!-- ── ORBITING DOTS — system/mastery nodes ── -->
  <!-- Small dots on the outer ring at cardinal-ish positions -->
  <circle cx="256" cy="88"  r="4" fill="#ff4081" opacity="0.8"/>
  <circle cx="424" cy="256" r="4" fill="#ab47bc" opacity="0.8"/>
  <circle cx="256" cy="424" r="3" fill="#e91e63" opacity="0.5"/>
  <circle cx="88"  cy="256" r="3" fill="#ab47bc" opacity="0.5"/>

  <!-- Gold star sparkles — 4 of Eros's sparks -->
  <!-- Sparkle 1: top-right area -->
  <g filter="url(#goldGlow)" opacity="0.9" transform="translate(360, 142)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffcc02"/>
  </g>
  <!-- Sparkle 2: smaller, near heart -->
  <g filter="url(#goldGlow)" opacity="0.7" transform="translate(300, 210)">
    <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="#ffab40"/>
  </g>
  <!-- Sparkle 3: lower left -->
  <g filter="url(#goldGlow)" opacity="0.55" transform="translate(178, 345)">
    <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="#ffcc02"/>
  </g>

  <!-- ── WORDMARK — "EROS" in tiny spaced caps at bottom ── -->
  <text x="256" y="450"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="700"
        letter-spacing="12"
        fill="#f8eaf2"
        opacity="0.75">EROS</text>

  <!-- Tiny subtitle line -->
  <text x="256" y="472"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        letter-spacing="5"
        fill="#906880"
        opacity="0.7">MASTERY</text>

  <!-- ── GLASS GLOSS OVERLAY ── -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112"
        fill="url(#gloss)"/>

  <!-- Thin luminous border -->
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111"
        fill="none"
        stroke="rgba(255,180,220,0.18)"
        stroke-width="1.5"/>
  <!-- Inner border accent -->
  <rect x="6" y="6" width="500" height="500" rx="107" ry="107"
        fill="none"
        stroke="rgba(255,255,255,0.04)"
        stroke-width="1"/>
</svg>
